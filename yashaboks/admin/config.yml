# ============================================================
# yashaboks — конфиг панели управления (Sveltia CMS)
#
# ВАЖНО (делаю я на шаге подключения):
#   ниже в repo: заменить OWNER/REPO на реальный GitHub-репозиторий,
#   например:  repo: ivan-gold/yashaboks
#   Пока это заглушка — вход работать не будет, это нормально.
# ============================================================

backend:
  name: github
  repo: yashaboks/zoloto
  branch: main
  base_url: https://sveltia-cms-auth.crushingex8.workers.dev

# Куда панель кладёт загруженные фотографии.
# Сайт опубликован из подпапки yashaboks/, поэтому физически файлы
# должны лежать в yashaboks/assets/img, а на сайте они доступны по /assets/img.
media_folder: "yashaboks/assets/img"
public_folder: "/assets/img"

# Язык самой панели
locale: "ru"

# Публикуем сразу, без черновиков-модерации
publish_mode: simple

collections:
  # ---------------- ИЗДЕЛИЯ ----------------
  - name: "catalog"
    label: "Изделия в наличии"
    label_singular: "изделие"
    delete: false
    files:
      - name: "items"
        label: "Список изделий"
        file: "yashaboks/assets/data/catalog.json"
        format: "json"
        description: >-
          Добавляйте, редактируйте и удаляйте изделия.
          Порядок меняется перетаскиванием. Фото не обязательно —
          без него покажется иконка по типу изделия.
        fields:
          - name: "items"
            label: "Изделия"
            label_singular: "изделие"
            widget: "list"
            summary: "{{fields.name_uk}} · {{fields.weight}} г"
            fields:
              - name: "photos"
                label: "Фото (до 3-х; первое — обложка)"
                widget: "list"
                required: false
                max: 3
                field: { name: "image", label: "Фото", widget: "image" }
                hint: "Первое фото — обложка карточки. Можно 1, 2 или 3. Перетаскиванием меняется порядок."
              - { name: "name_uk", label: "Название", widget: "string" }
              - name: "proba"
                label: "Проба (585, 750, 999…)"
                widget: "number"
                value_type: "int"
                default: 585
              - name: "weight"
                label: "Вес, грамм (можно с запятой: 13,33)"
                widget: "string"
                hint: "Например: 13,33 или 13.33"
              - name: "length"
                label: "Длина (необязательно, напр. 50 см)"
                widget: "string"
                required: false
                hint: "Только для цепочек и браслетов. Можно оставить пустым."
              - name: "price"
                label: "Цена, ₴ (оставить пустым = «по договорённости»)"
                widget: "number"
                value_type: "int"
                required: false
              - name: "status"
                label: "Статус"
                widget: "select"
                default: "available"
                options:
                  - { label: "В наличии", value: "available" }
                  - { label: "Продано", value: "sold" }

  # ---------------- НАСТРОЙКИ / КОНТАКТЫ ----------------
  - name: "settings"
    label: "Настройки"
    delete: false
    files:
      - name: "main"
        label: "Цена и контакты"
        file: "yashaboks/assets/data/settings.json"
        format: "json"
        description: "Ставка за грамм и все контакты, которые показываются на сайте."
        fields:
          - name: "rate"
            label: "Моя ставка, ₴ за грамм"
            widget: "number"
            value_type: "int"
            default: 3500
          - name: "pawnRate"
            label: "Ставка ломбарда (для сравнения), ₴"
            widget: "number"
            value_type: "int"
            default: 3000
          - { name: "phone", label: "Телефон для ссылки (только +380 и цифры)", widget: "string" }
          - { name: "phoneDisplay", label: "Телефон как показывать (+380 00 000 00 00)", widget: "string" }
          - { name: "telegram", label: "Telegram — ссылка (https://t.me/имя)", widget: "string" }
          - { name: "whatsapp", label: "WhatsApp — ссылка (https://wa.me/380…)", widget: "string" }
          - { name: "viber", label: "Viber — ссылка (viber://chat?number=%2B380…)", widget: "string" }
          - { name: "tiktok", label: "TikTok — ссылка", widget: "string" }
          - { name: "instagram", label: "Instagram — ссылка", widget: "string" }
